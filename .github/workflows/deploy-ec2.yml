name: Deploy to EC2

# Mirrors the Render/Vercel auto-deploy: every push to main ships the same
# commit to the self-hosted box. See PackwithMe deployment runbook §6b for
# the one-time server setup this depends on (git clone at ~/hostel-git,
# pm2 process "hostel-api", static webroot /var/www/hostel/dist).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# The remote step SSHes into one 1GB EC2 box and does `git reset --hard` + npm ci + tsc/vite
# builds for both apps in the SAME ~/hostel-git checkout. A burst of pushes to main used to
# fire one of these per push with no coordination, so several would run at once, stomping on
# each other's checkout/build/dist directory and failing outright on a box that struggles to
# fit even one such build in memory. Queuing them (not cancelling) lets an in-flight deploy
# finish untouched; since `git reset --hard origin/main` always deploys whatever's newest
# regardless of which push triggered it, only the latest queued run actually needs to happen —
# GitHub drops any earlier *pending* runs in the group automatically, without touching one
# that's already running remotely.
concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Deliberately not using a third-party Docker-based ssh action here: those run in
      # their own container, which only mounts the workspace/temp dirs — not /tmp — so a
      # key file written in an earlier step is invisible to it. Plain ssh on the runner
      # itself avoids that entirely.
      #
      # EC2_SSH_KEY_B64 is the private key, base64-encoded to one line — a plain
      # multi-line key secret kept getting mangled in transit (missing/duplicated lines).
      - name: Decode deploy key
        run: |
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d -i > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh-keygen -y -f /tmp/deploy_key > /dev/null || {
            echo "::error::Decoded EC2_SSH_KEY_B64 is not a valid private key — re-copy 'base64 -w0 ~/.ssh/gha_deploy' on the box and update the secret."
            exit 1
          }

      - name: Deploy over SSH
        run: |
          ssh -o StrictHostKeyChecking=accept-new -i /tmp/deploy_key "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" bash -s <<'REMOTE'
          set -euo pipefail

          # 1GB box has no swap by default, so a single tsc/vite build spiking memory
          # OOMs the whole instance (and drops this SSH session with it) rather than
          # just the node process. 2G swapfile gives the kernel room to page instead
          # of killing sshd. Idempotent: only created once, persisted via fstab so it
          # survives a reboot too.
          if [ ! -f /swapfile ]; then
            sudo fallocate -l 2G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
            echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab > /dev/null
          fi

          # Heap capped below physical RAM (not 1536, which exceeded it and still
          # invited OOM) now that swap is here as a safety net rather than the only
          # thing standing between a build and a killed SSH session.
          export NODE_OPTIONS=--max-old-space-size=768

          cd ~/hostel-git
          git fetch origin main
          git reset --hard origin/main

          cd ~/hostel-git/backend
          npm ci --no-audit --no-fund
          npm run build

          # Both scripts upsert by a stable key (name+store / city+name) and touch only their
          # own collection, so they're safe to re-run on every deploy — unlike `npm run seed`,
          # which also overwrites Guide article content and would stomp an admin's edits if it
          # ran unattended like this. Without this step, a fresh production database never gets
          # products/places at all: nothing else runs these after a deploy. See ensureCitiesSeeded
          # in cityService.ts for the same gap already fixed for the City collection.
          npm run seed:products
          npm run seed:places

          # Imports any DEFAULT_CHECKLIST_TEMPLATE item (e.g. the "Hobbies" category added
          # after launch) that isn't yet in the live DefaultChecklistItem catalog, matched by
          # template+category+title — never duplicates or overwrites an admin edit, so it's a
          # no-op once caught up. Without this, new template items never reach production:
          # ensureTemplateHasDefaultItems only seeds a template that has zero items at all.
          npm run seed:checklist-taxonomy

          # Retags the handful of DefaultChecklistItem docs (e.g. "Trimmer / Razor",
          # "Sanitary Products") that defaultChecklistTemplate.ts now targets at a specific
          # gender, matched by template+category+title — only flips a doc whose gender is
          # CURRENTLY exactly "All" (the untouched default), so it never overwrites an admin's
          # manual gender edit. Safe/no-op to rerun every deploy once every matching doc is
          # caught up. See scripts/retagChecklistGender.ts for the one known limitation (an
          # admin manually resetting one back to "All" gets re-tagged on the next deploy).
          npm run migrate:checklist-gender

          # Category.ts only seeds a user's default folders once (existingCount === 0), so a
          # category added to the template after a user already onboarded — like Hobbies —
          # never reaches them on its own. Backfills that folder onto existing users; skips
          # anyone who already has it, so also a no-op once caught up.
          npm run categories:add-hobbies

          # Fills imageUrl on any place seedPlaces.ts just created (or left) with none, from
          # Wikipedia — no API key needed. Only touches places where imageUrl is still null,
          # so on a caught-up DB this is a single no-op query; only newly-added placeless
          # places cost the ~1.2s/place Wikipedia lookup. See fetchPlaceImages.ts.
          npm run images:places

          cd ~/hostel-git/frontend
          npm ci --no-audit --no-fund
          npm run build

          sudo mkdir -p /var/www/hostel/dist
          sudo rm -rf /var/www/hostel/dist/*
          sudo cp -r dist/. /var/www/hostel/dist/

          cd ~/hostel-git/backend
          pm2 restart hostel-api --update-env || pm2 start dist/index.js --name hostel-api --time
          pm2 save

          sudo nginx -t
          sudo systemctl reload nginx
          REMOTE
