services:
  - type: web
    name: hostel-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      # Required at boot as of this change (backend/src/lib/env.ts) — the app will refuse to
      # start without these two set. Generate with `openssl rand -base64 32` (IP_HASH_SALT) and
      # `openssl rand -hex 32` (PIN_ENCRYPTION_KEY); set both in Render's dashboard before
      # deploying this change.
      - key: IP_HASH_SALT
        sync: false
      - key: PIN_ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: FRONTEND_URL
        value: https://packwithme.instify.in
      - key: NODE_ENV
        value: production
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_API_VERSION
        value: v18.0
      - key: WHATSAPP_OTP_TEMPLATE_NAME
        value: instify_otp
      - key: WHATSAPP_OTP_TEMPLATE_LANGUAGE
        value: en_US
      - key: WHATSAPP_ADMIN_REACTIVATION_TEMPLATE_NAME
        value: admin_window_reactivation
      - key: WHATSAPP_ADMIN_REACTIVATION_TEMPLATE_LANGUAGE
        value: en_US
      - key: METABSP_WEBHOOK_SECRET
        sync: false
