<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Plan, pack, and organize everything for hostel life — checklists, budget, documents, and more." />
    <meta name="theme-color" content="#c96b9a" />
    <!-- Paints the very first frame before any external stylesheet has loaded — iOS standalone
         (Add to Home Screen) launches have no splash-screen config of their own
         (apple-touch-startup-image), so absent this WebKit's default unstyled background shows
         through for the whole cold-start network round trip, which reads as a black flash. This
         is synchronous and part of the initial HTML parse, so it applies before the Tailwind
         bundle (or the manifest's own background_color, which iOS doesn't honor here) ever has
         a chance to. Matches manifest.webmanifest's background_color and index.css's
         --background so there's no visible handoff once the real stylesheet does load. -->
    <style>
      html, body { background-color: #fdf6ee; }
    </style>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Pack with Me" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Open the API origin's DNS+TLS+TCP handshake in parallel with JS parsing, so the very
         first fetch (auth/me) starts on a warm connection instead of paying it serially.
         %VITE_API_URL% is substituted at build time from the same env var lib/api.ts uses. -->
    <link rel="preconnect" href="%VITE_API_URL%" crossorigin />
    <!-- Load fonts without blocking first paint: fetch as a print stylesheet (non-blocking),
         then flip to `all` once it arrives. display=swap already renders text in a fallback
         face meanwhile, so the swap is seamless. <noscript> keeps it working without JS. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&family=Alex+Brush&family=Caveat:wght@600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&family=Alex+Brush&family=Caveat:wght@600;700&display=swap"
      />
    </noscript>
    <title>Pack with Me</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
